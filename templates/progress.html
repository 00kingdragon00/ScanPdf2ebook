<!doctype html>
<title>OCR in progress</title>
<link rel="stylesheet" href="/static/style.css">
<div class="page">
  <div class="card">
    <h1>OCR in progress: {{ book }}</h1>
    <div class="progress-track">
      <div class="progress-fill" id="fill"></div>
    </div>
    <p class="progress-label" id="status">Starting...</p>
  </div>
</div>
<script>
async function poll() {
  const res = await fetch("/status/{{ book }}");
  const data = await res.json();
  const status = document.getElementById("status");
  const fill = document.getElementById("fill");
  const pct = data.total ? Math.round((data.done / data.total) * 100) : 0;
  fill.style.width = pct + "%";

  if (data.finished) {
    if (data.error) {
      status.textContent = "OCR failed: " + data.error;
      status.classList.add("progress-error");
    } else {
      window.location.href = "/review/{{ book }}";
    }
  } else {
    const phaseLabels = {
      "downloading": "Downloading video...",
      "extracting frames": "Extracting frames...",
    };
    status.textContent = phaseLabels[data.phase] || ("Page " + data.done + "/" + data.total + " (" + pct + "%)");
    setTimeout(poll, 2000);
  }
}
poll();
</script>
