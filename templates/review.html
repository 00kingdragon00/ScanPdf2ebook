<!doctype html>
<title>Review: {{ book }}</title>
<h1>Review OCR: {{ book }}</h1>
<form id="convert-form" action="/convert/{{ book }}" method="post">
  <input type="hidden" name="total" value="{{ pages|length }}">
  <p>
    Title: <input type="text" name="title" value="{{ detected_title }}">
    Author: <input type="text" name="author" value="Unknown">
  </p>

  {% for page in pages %}
  <fieldset>
    <legend>Page {{ page.num }}{% if page.failed %} — OCR FAILED{% endif %}</legend>
    <img src="/pages/{{ book }}/{{ page.image }}" width="300">
    <textarea name="text_{{ page.num }}" rows="10" cols="80">{{ page.text }}</textarea>
    <label>
      <input type="checkbox" class="approve-box" name="approved_{{ page.num }}">
      Approved
    </label>
  </fieldset>
  {% endfor %}

  <button type="submit" id="convert-btn" disabled>Convert to EPUB</button>
</form>

<script>
const boxes = document.querySelectorAll(".approve-box");
const btn = document.getElementById("convert-btn");
function refresh() {
  btn.disabled = !Array.from(boxes).every(b => b.checked);
}
boxes.forEach(b => b.addEventListener("change", refresh));
refresh();
</script>
